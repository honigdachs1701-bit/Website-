<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vielen Dank! | Haus- & Gartenservice Havelland</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.box{background:#fff;border-radius:12px;padding:3rem 2.5rem;max-width:500px;width:100%;text-align:center;box-shadow:0 4px 30px rgba(0,0,0,.08);}
.icon{font-size:4rem;margin-bottom:1rem;}
h1{font-family:'Oswald',sans-serif;font-size:2.5rem;font-weight:700;text-transform:uppercase;color:#1a4a1a;margin-bottom:.8rem;}
p{color:#555;line-height:1.75;margin-bottom:1.5rem;}
a{display:inline-block;background:#e8a000;color:#000;padding:12px 28px;border-radius:3px;font-weight:700;text-decoration:none;text-transform:uppercase;font-size:.9rem;}
</style>
</head>
<body>
<div class="box">
  <div class="icon">✅</div>
  <h1>Vielen Dank!</h1>
  <p>Ihre Anfrage ist bei uns eingegangen. Wir melden uns noch am selben Tag – per Telefon oder WhatsApp.</p>
  <p>Bei dringenden Anfragen erreichen Sie uns direkt:</p>
  <a href="https://wa.me/4915156198195">💬 WhatsApp schreiben</a>
  <br><br>
  <a href="index.html" style="background:#f0f0f0;color:#333;">Zurück zur Startseite</a>
</div>

<script>
(function(){
  var btn=document.getElementById('hb');
  var nav=document.getElementById('nl');
  if(btn&&nav){
    function toggle(e){e.stopPropagation();nav.classList.toggle('open');}
    btn.addEventListener('click',toggle);
    btn.addEventListener('touchstart',function(e){e.preventDefault();toggle(e);},{passive:false});
    document.addEventListener('click',function(e){
      if(!btn.contains(e.target)&&!nav.contains(e.target))nav.classList.remove('open');
    });
    document.addEventListener('touchstart',function(e){
      if(!btn.contains(e.target)&&!nav.contains(e.target))nav.classList.remove('open');
    });
  }
  document.querySelectorAll('.faqq').forEach(function(q){
    q.addEventListener('click',function(){q.parentElement.classList.toggle('open');});
  });
})();
</script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var btn=document.getElementById('hb');
  var nav=document.getElementById('nl');
  if(!btn||!nav)return;
  btn.style.zIndex='9999';
  btn.style.position='relative';
  function toggle(){nav.classList.toggle('open');}
  btn.onclick=function(e){e.preventDefault();e.stopPropagation();toggle();};
  document.addEventListener('click',function(e){
    if(nav.classList.contains('open')&&!nav.contains(e.target)&&!btn.contains(e.target)){
      nav.classList.remove('open');
    }
  });
  document.querySelectorAll('.faqq').forEach(function(q){
    q.parentElement.querySelector('.faqq').onclick=function(){q.parentElement.classList.toggle('open');};
  });
});
</script>
</body>
</html>
